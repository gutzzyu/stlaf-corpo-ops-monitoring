<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>STLAF Mission Control</title>
    <script>
      // Prevent libraries from crashing when trying to polyfill fetch in restricted iframes
      try {
        const originalFetch = window.fetch;
        if (originalFetch) {
          let warningLogged = false;
          Object.defineProperty(window, 'fetch', {
            get: () => originalFetch,
            set: () => { 
              if (!warningLogged) {
                console.debug('Prevented attempt to overwrite window.fetch');
                warningLogged = true;
              }
            },
            configurable: true
          });
        }
      } catch (e) {
        // Silently fail if defineProperty is not supported or restricted
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
